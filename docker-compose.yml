services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: energy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vector-db:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      # qdrant/qdrant ships no curl/wget, only bash — use bash's /dev/tcp to
      # speak raw HTTP to the /healthz endpoint.
      test:
        - "CMD-SHELL"
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 &&
          printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          head -1 <&3 | grep -q "200 OK"'
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
      - METRICS_PORT=9100
    ports:
      - "9100:9100"
    volumes:
      - ./shared:/app/shared
      - ./services/ingestor:/app/services/ingestor

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    restart: unless-stopped
    depends_on:
      vector-db:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - METRICS_PORT=9101
      # Opt-in gate on the scheduler's automatic 30-minute crawl cycle (each
      # cycle costs one Claude Haiku call per new article found) -- defaults
      # to off. `POST /crawler/run-now` on the api service always works
      # regardless. See .env.example / DEPLOYMENT.md.
      - AUTO_RUN_ENABLED=${AUTO_RUN_ENABLED:-false}
    ports:
      - "9101:9101"
    volumes:
      - ./shared:/app/shared
      - ./services/crawler:/app/services/crawler

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - METRICS_PORT=9102
      # Opt-in gate on the scheduler's automatic 15-minute trigger-evaluation
      # + synthesis cycle (each fired trigger costs one Claude Opus call) --
      # defaults to off. `POST /orchestrator/run-now` on the api service
      # always works regardless. See .env.example / DEPLOYMENT.md.
      - AUTO_RUN_ENABLED=${AUTO_RUN_ENABLED:-false}
    ports:
      - "9102:9102"
    volumes:
      - ./shared:/app/shared
      - ./services/orchestrator:/app/services/orchestrator

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
      - API_KEY=${API_KEY:-}
      # Manual-article submission tool (services/api/main.py's
      # /manual-articles / /dashboard/manual-articles): reuses the same
      # crawler pipeline shared/claim_extractor.py + shared/vector_store.py
      # already talk to. Also used by the on-demand /crawler/run-now and
      # /orchestrator/run-now routes below, which load and run
      # services/crawler/main.py's/services/orchestrator/main.py's exact
      # cycle functions in-process against these same env vars.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - QDRANT_URL=http://vector-db:6333
      # Needed only for the on-demand /orchestrator/run-now route (a
      # published Event Report posts to Slack exactly like the scheduled
      # cycle does) -- same graceful-skip-if-unset behavior as everywhere
      # else this is read (shared/slack_notifier.py).
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    ports:
      - "8080:8000"
    volumes:
      - ./shared:/app/shared
      - ./services/api:/app/services/api

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - ingestor
      - crawler
      - orchestrator
      - api

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  qdrant_data:
  prometheus_data:
  grafana_data: