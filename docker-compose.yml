version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: energy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  vector-db:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
    volumes:
      - ./shared:/app/shared
      - ./services/ingestor:/app/services/ingestor

volumes:
  pgdata:
  qdrant_data: