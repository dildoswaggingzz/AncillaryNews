services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: energy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vector-db:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      # qdrant/qdrant ships no curl/wget, only bash — use bash's /dev/tcp to
      # speak raw HTTP to the /healthz endpoint.
      test:
        - "CMD-SHELL"
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 &&
          printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          head -1 <&3 | grep -q "200 OK"'
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
    volumes:
      - ./shared:/app/shared
      - ./services/ingestor:/app/services/ingestor

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    restart: unless-stopped
    depends_on:
      vector-db:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./shared:/app/shared
      - ./services/crawler:/app/services/crawler

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./shared:/app/shared
      - ./services/orchestrator:/app/services/orchestrator

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-secret}@db:5432/energy
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./services/api:/app/services/api

volumes:
  pgdata:
  qdrant_data: