# Scrape config for the four AncillaryNews services (README §7: "Prometheus
# + Grafana (poller health, trigger rates, LLM latency/cost)"). Targets are
# docker-compose service names -- resolved via the compose network, no host
# port publishing required for scraping to work (see docker-compose.yml).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestor
    static_configs:
      - targets: ["ingestor:9100"]

  - job_name: crawler
    static_configs:
      - targets: ["crawler:9101"]

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:9102"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
