repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lockstep with the ruff version CI runs (pyproject dev-deps /
    # `ruff --version`): a rev skew here formats differently than CI's
    # `ruff format --check .`, which is exactly how unformatted files slipped
    # onto main despite this hook existing.
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
